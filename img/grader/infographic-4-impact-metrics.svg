<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#0a192f"/>

  <!-- Title -->
  <text x="500" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#ccd6f6">Impact: Before vs After</text>
  <text x="500" y="75" font-family="Arial, sans-serif" font-size="15" text-anchor="middle" fill="#8892b0">3 months post-launch (200+ evaluators)</text>

  <!-- Column Headers -->
  <text x="280" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#ff6b6b">BEFORE</text>
  <text x="720" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#64ffda">AFTER</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#64ffda"/>
    </marker>
  </defs>

  <!-- Card 1: Grading Time -->
  <g>
    <rect x="60" y="140" width="200" height="110" fill="#112240" stroke="#233554" stroke-width="2" rx="8"/>
    <text x="160" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Grading Time</text>
    <text x="160" y="192" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">(100-120 submissions)</text>
    <text x="160" y="225" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ff6b6b">2 hr</text>
    <path d="M 280 195 L 380 195" stroke="#64ffda" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="330" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#64ffda">-45%</text>
    <rect x="400" y="140" width="200" height="110" fill="#112240" stroke="#64ffda" stroke-width="2" rx="8"/>
    <rect x="400" y="140" width="200" height="110" fill="rgba(100, 255, 218, 0.05)" rx="8"/>
    <text x="500" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Grading Time</text>
    <text x="500" y="192" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">(100-120 submissions)</text>
    <text x="500" y="225" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#64ffda">1 hr</text>
  </g>

  <!-- Card 2: Satisfaction -->
  <g>
    <rect x="60" y="270" width="200" height="100" fill="#112240" stroke="#233554" stroke-width="2" rx="8"/>
    <text x="160" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Satisfaction</text>
    <text x="160" y="335" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ff6b6b">62%</text>
    <path d="M 280 320 L 380 320" stroke="#64ffda" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="330" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#64ffda">+33pts</text>
    <rect x="400" y="270" width="200" height="100" fill="#112240" stroke="#64ffda" stroke-width="2" rx="8"/>
    <rect x="400" y="270" width="200" height="100" fill="rgba(100, 255, 218, 0.05)" rx="8"/>
    <text x="500" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Satisfaction</text>
    <text x="500" y="335" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#64ffda">95%</text>
  </g>

  <!-- Card 3: NPS -->
  <g>
    <rect x="60" y="390" width="200" height="100" fill="#112240" stroke="#233554" stroke-width="2" rx="8"/>
    <text x="160" y="420" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Net Promoter Score</text>
    <text x="160" y="455" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ff6b6b">6/10</text>
    <path d="M 280 440 L 380 440" stroke="#64ffda" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <text x="330" y="430" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#64ffda">+50%</text>
    <rect x="400" y="390" width="200" height="100" fill="#112240" stroke="#64ffda" stroke-width="2" rx="8"/>
    <rect x="400" y="390" width="200" height="100" fill="rgba(100, 255, 218, 0.05)" rx="8"/>
    <text x="500" y="420" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Net Promoter Score</text>
    <text x="500" y="455" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#64ffda">9/10</text>
  </g>

  <!-- Card 4: Errors Caught -->
  <g>
    <rect x="640" y="140" width="200" height="110" fill="#112240" stroke="#233554" stroke-width="2" rx="8"/>
    <text x="740" y="170" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Grading Errors</text>
    <text x="740" y="192" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">(caught by AI QC)</text>
    <text x="740" y="225" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ff6b6b">0</text>
    <text x="740" y="240" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8892b0">No AI QC</text>
    <rect x="640" y="270" width="200" height="100" fill="#112240" stroke="#64ffda" stroke-width="2" rx="8"/>
    <rect x="640" y="270" width="200" height="100" fill="rgba(100, 255, 218, 0.05)" rx="8"/>
    <text x="740" y="300" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Errors Caught</text>
    <text x="740" y="335" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#64ffda">1,200+</text>
    <text x="740" y="355" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64ffda">60% reduction</text>
  </g>

  <!-- Card 5: Mobile Adoption -->
  <g>
    <rect x="640" y="390" width="200" height="100" fill="#112240" stroke="#233554" stroke-width="2" rx="8"/>
    <text x="740" y="420" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Mobile Grading</text>
    <text x="740" y="455" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#ff6b6b">0%</text>
    <text x="740" y="470" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8892b0">Not supported</text>
    <rect x="860" y="390" width="120" height="100" fill="#112240" stroke="#64ffda" stroke-width="2" rx="8"/>
    <rect x="860" y="390" width="120" height="100" fill="rgba(100, 255, 218, 0.05)" rx="8"/>
    <text x="920" y="420" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#a8b2d1">Mobile</text>
    <text x="920" y="455" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#64ffda">25%</text>
    <text x="920" y="470" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">adoption</text>
  </g>

  <!-- Bottom summary -->
  <rect x="60" y="520" width="920" height="60" fill="rgba(100, 255, 218, 0.1)" stroke="#233554" stroke-width="2" rx="8"/>
  <text x="500" y="545" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#64ffda">Business Impact</text>
  <text x="500" y="565" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#a8b2d1">₹15L annual savings • 200+ evaluators daily active • Feedback cycles: 7-10 days → 3-5 days (target achieved)</text>
</svg>
