<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="500" fill="#0a192f"/>

  <!-- Title -->
  <text x="450" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ccd6f6">
    Information Architecture: Old vs New
  </text>
  <text x="450" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8892b0">
    From single cluttered view to focused, task-specific views
  </text>

  <!-- OLD SYSTEM (Left Side) -->
  <text x="220" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ff6b6b">
    OLD: Canvas SpeedGrader
  </text>

  <!-- Old system box -->
  <rect x="60" y="140" width="320" height="280" fill="#112240" stroke="#ff6b6b" stroke-width="3" rx="8"/>

  <!-- Header -->
  <rect x="70" y="150" width="300" height="35" fill="rgba(255, 107, 107, 0.2)" rx="4"/>
  <text x="220" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
    Everything in One View
  </text>

  <rect x="80" y="200" width="280" height="30" fill="#233554" rx="3"/>
  <text x="90" y="220" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Student list + Grading + Analytics</text>

  <rect x="80" y="240" width="280" height="30" fill="#233554" rx="3"/>
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Rubric + Comments + Files</text>

  <rect x="80" y="280" width="280" height="30" fill="#233554" rx="3"/>
  <text x="90" y="300" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Progress tracking mixed with grading</text>

  <rect x="80" y="320" width="280" height="30" fill="#233554" rx="3"/>
  <text x="90" y="340" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• No separation of concerns</text>

  <text x="220" y="375" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6b6b" text-anchor="middle">Problems:</text>
  <text x="220" y="393" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1" text-anchor="middle">Cluttered • Can't focus • Slow</text>
  <text x="220" y="408" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1" text-anchor="middle">Single workflow for all tasks</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64ffda"/>
    </marker>
  </defs>
  <path d="M 400 280 L 480 280" stroke="#64ffda" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="440" y="270" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#64ffda" text-anchor="middle">Redesigned</text>

  <!-- NEW SYSTEM (Right Side) -->
  <text x="690" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#64ffda">
    NEW: GlaideGrader
  </text>

  <!-- View 1 -->
  <rect x="520" y="140" width="340" height="70" fill="#112240" stroke="#64ffda" stroke-width="2" rx="6"/>
  <text x="535" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64ffda">1. Submissions View</text>
  <text x="545" y="180" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">Focus: Grading individual submissions</text>
  <text x="545" y="197" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Split panel: Submission + Rubric</text>

  <!-- View 2 -->
  <rect x="520" y="225" width="340" height="70" fill="#112240" stroke="#64ffda" stroke-width="2" rx="6"/>
  <text x="535" y="245" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64ffda">2. Learners Table View</text>
  <text x="545" y="265" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">Focus: Batch overview &amp; navigation</text>
  <text x="545" y="282" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Spreadsheet-style, sortable columns</text>

  <!-- View 3 -->
  <rect x="520" y="310" width="340" height="70" fill="#112240" stroke="#64ffda" stroke-width="2" rx="6"/>
  <text x="535" y="330" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#64ffda">3. Summary Dashboard</text>
  <text x="545" y="350" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">Focus: Analytics &amp; progress tracking</text>
  <text x="545" y="367" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">• Charts, stats, rubric performance</text>

  <text x="690" y="405" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#64ffda" text-anchor="middle">Benefits:</text>
  <text x="690" y="423" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1" text-anchor="middle">Focused • Task-specific • Fast</text>
  <text x="690" y="438" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1" text-anchor="middle">Right tool for the right task</text>

  <!-- Bottom insight -->
  <rect x="50" y="455" width="800" height="35" fill="rgba(100, 255, 218, 0.1)" stroke="#233554" stroke-width="1" rx="6"/>
  <text x="450" y="478" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#ccd6f6">
    <tspan font-weight="600" fill="#64ffda">Design Decision:</tspan> Different tasks need different mental models — grading needs focus, tracking needs overview
  </text>
</svg>
