<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="650" fill="#0a192f"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ccd6f6">
    Information Architecture: Before vs After
  </text>
  <text x="500" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8892b0">
    From flat, timeless structure to week-based learning timeline
  </text>
  
  <!-- LEFT SIDE: OLD FLAT STRUCTURE -->
  <text x="230" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#ff6b6b">
    OLD: Flat Structure
  </text>
  <text x="230" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8892b0">
    No time dimension, hard to navigate
  </text>
  
  <!-- Program box -->
  <rect x="80" y="160" width="300" height="50" fill="#112240" stroke="#ff6b6b" stroke-width="2" rx="6"/>
  <text x="230" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#ccd6f6">
    📚 Program: PGP Data Science
  </text>
  
  <!-- Vertical line -->
  <line x1="230" y1="210" x2="230" y2="240" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Course 1 -->
  <rect x="80" y="245" width="300" height="45" fill="#112240" stroke="#233554" stroke-width="2" rx="4"/>
  <text x="95" y="272" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#ccd6f6">
    📖 Course: Python Programming
  </text>
  
  <!-- Modules under Course 1 (flat list) -->
  <rect x="100" y="300" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="317" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 1: Introduction to Python
  </text>
  
  <rect x="100" y="330" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="347" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 2: Data Types and Operators
  </text>
  
  <rect x="100" y="360" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="377" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 3: Control Flow
  </text>
  
  <rect x="100" y="390" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="407" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 4: Functions
  </text>
  
  <!-- Course 2 -->
  <rect x="80" y="430" width="300" height="45" fill="#112240" stroke="#233554" stroke-width="2" rx="4"/>
  <text x="95" y="457" font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#ccd6f6">
    📖 Course: Data Structures
  </text>
  
  <!-- Modules under Course 2 (flat list) -->
  <rect x="100" y="485" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="502" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 1: Lists and Tuples
  </text>
  
  <rect x="100" y="515" width="260" height="25" fill="#233554" rx="3"/>
  <text x="110" y="532" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Module 2: Dictionaries
  </text>
  
  <!-- Problems label -->
  <rect x="80" y="560" width="300" height="65" fill="rgba(255, 107, 107, 0.1)" stroke="#ff6b6b" stroke-width="1" rx="6"/>
  <text x="230" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#ff6b6b">
    Problems:
  </text>
  <text x="230" y="598" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a8b2d1">
    ❌ No time context (When to release?)
  </text>
  <text x="230" y="614" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a8b2d1">
    ❌ Hard to find Week 3 content
  </text>
  
  <!-- Transformation Arrow -->
  <path d="M 400 350 L 580 350" stroke="#64ffda" stroke-width="4" marker-end="url(#arrowLarge)"/>
  <rect x="430" y="330" width="120" height="30" fill="#0a192f"/>
  <text x="490" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#64ffda">
    Redesigned
  </text>
  
  <!-- RIGHT SIDE: NEW WEEK-BASED STRUCTURE -->
  <text x="770" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#64ffda">
    NEW: Week-Based Hierarchy
  </text>
  <text x="770" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#8892b0">
    Time as first-class entity
  </text>
  
  <!-- Program box -->
  <rect x="620" y="160" width="300" height="50" fill="#112240" stroke="#64ffda" stroke-width="2" rx="6"/>
  <text x="770" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#ccd6f6">
    📚 Program: PGP Data Science
  </text>
  
  <!-- Vertical line -->
  <line x1="770" y1="210" x2="770" y2="240" stroke="#64ffda" stroke-width="2"/>
  
  <!-- Week 1 (Delivery) -->
  <rect x="620" y="245" width="300" height="45" fill="#112240" stroke="#64ffda" stroke-width="2" rx="4"/>
  <text x="635" y="267" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#64ffda">
    📅 Week 1
  </text>
  <text x="710" y="267" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    (Oct 7 - Oct 13)
  </text>
  
  <!-- Course under Week 1 -->
  <rect x="640" y="300" width="260" height="30" fill="rgba(100, 255, 218, 0.1)" stroke="#233554" stroke-width="1" rx="3"/>
  <text x="650" y="320" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#ccd6f6">
    Python Programming
  </text>
  
  <!-- Modules under Week 1 -->
  <rect x="660" y="337" width="220" height="20" fill="#233554" rx="2"/>
  <text x="670" y="351" font-family="Arial, sans-serif" font-size="10" fill="#a8b2d1">
    • Module 1: Intro to Python
  </text>
  
  <rect x="660" y="362" width="220" height="20" fill="#233554" rx="2"/>
  <text x="670" y="376" font-family="Arial, sans-serif" font-size="10" fill="#a8b2d1">
    • Module 2: Data Types
  </text>
  
  <!-- Week 2 (Delivery) -->
  <rect x="620" y="400" width="300" height="45" fill="#112240" stroke="#64ffda" stroke-width="2" rx="4"/>
  <text x="635" y="422" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#64ffda">
    📅 Week 2
  </text>
  <text x="710" y="422" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    (Oct 14 - Oct 20)
  </text>
  
  <!-- Course under Week 2 -->
  <rect x="640" y="455" width="260" height="30" fill="rgba(100, 255, 218, 0.1)" stroke="#233554" stroke-width="1" rx="3"/>
  <text x="650" y="475" font-family="Arial, sans-serif" font-size="11" font-weight="500" fill="#ccd6f6">
    Python Programming
  </text>
  
  <!-- Modules under Week 2 -->
  <rect x="660" y="492" width="220" height="20" fill="#233554" rx="2"/>
  <text x="670" y="506" font-family="Arial, sans-serif" font-size="10" fill="#a8b2d1">
    • Module 3: Control Flow
  </text>
  
  <rect x="660" y="517" width="220" height="20" fill="#233554" rx="2"/>
  <text x="670" y="531" font-family="Arial, sans-serif" font-size="10" fill="#a8b2d1">
    • Module 4: Functions
  </text>
  
  <!-- Benefits label -->
  <rect x="620" y="560" width="300" height="65" fill="rgba(100, 255, 218, 0.1)" stroke="#64ffda" stroke-width="1" rx="6"/>
  <text x="770" y="580" font-family="Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#64ffda">
    Benefits:
  </text>
  <text x="770" y="598" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a8b2d1">
    ✅ Time is visible (Week-based navigation)
  </text>
  <text x="770" y="614" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#a8b2d1">
    ✅ Easy to find, plan, and release
  </text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowLarge" markerWidth="15" markerHeight="15" refX="13" refY="5" orient="auto">
      <polygon points="0 0, 15 5, 0 10" fill="#64ffda"/>
    </marker>
  </defs>
</svg>