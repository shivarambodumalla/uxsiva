<svg viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1100" height="700" fill="#0a192f"/>
  
  <!-- Title -->
  <text x="550" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ccd6f6">
    Version Sync Flow: Template to Batches
  </text>
  <text x="550" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8892b0">
    How curriculum changes propagate from template to all active batches
  </text>
  
  <!-- Step 1: Template v2 Published -->
  <g transform="translate(50, 120)">
    <rect width="280" height="120" fill="#112240" stroke="#64ffda" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#64ffda"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a192f">1</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#64ffda">
      Template v2 Published
    </text>
    
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ccd6f6">
      AcadOps creates new version
    </text>
    
    <rect x="20" y="70" width="240" height="35" fill="rgba(100, 255, 218, 0.1)" rx="4"/>
    <text x="30" y="88" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">
      ✓ Week 3 updated: New module added
    </text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">
      ✓ Week 5 updated: Content revised
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 330 180 L 410 180" stroke="#64ffda" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="370" y="170" font-family="Arial, sans-serif" font-size="11" fill="#64ffda">Auto</text>
  
  <!-- Step 2: System Analysis -->
  <g transform="translate(420, 120)">
    <rect width="280" height="120" fill="#112240" stroke="#ffd700" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#ffd700"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a192f">2</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#ffd700">
      Identify Affected Batches
    </text>
    
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ccd6f6">
      System scans all active batches
    </text>
    
    <rect x="20" y="70" width="240" height="35" fill="rgba(255, 215, 0, 0.1)" rx="4"/>
    <text x="30" y="88" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">
      Found: 24 batches will be affected
    </text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">
      • 18 ongoing • 6 upcoming
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 700 180 L 780 180" stroke="#64ffda" stroke-width="3" marker-end="url(#arrow)"/>
  
  <!-- Step 3: AcadOps Review -->
  <g transform="translate(790, 120)">
    <rect width="280" height="120" fill="#112240" stroke="#ffb347" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#ffb347"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a192f">3</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#ffb347">
      Review Each Batch
    </text>
    
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ccd6f6">
      AcadOps sees batch list
    </text>
    
    <rect x="20" y="70" width="240" height="35" fill="rgba(255, 179, 71, 0.1)" rx="4"/>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="11" fill="#a8b2d1">
      Batch: DSBA-Oct25-A
    </text>
    <text x="30" y="100" font-family="Arial, sans-serif" font-size="11" fill="#64ffda">
      → Upcoming Delivery: Week 3
    </text>
  </g>
  
  <!-- Vertical arrow down -->
  <path d="M 550 260 L 550 300" stroke="#64ffda" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="560" y="285" font-family="Arial, sans-serif" font-size="11" fill="#64ffda">Review</text>
  
  <!-- Step 4: Conflict Check -->
  <g transform="translate(410, 310)">
    <rect width="280" height="140" fill="#112240" stroke="#ff6b6b" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#ff6b6b"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#e6f1ff">4</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#ff6b6b">
      Detect Conflicts
    </text>
    
    <text x="20" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ccd6f6">
      Compare template vs batch
    </text>
    
    <!-- Conflict visualization -->
    <rect x="20" y="70" width="240" height="60" fill="rgba(255, 107, 107, 0.1)" stroke="#233554" stroke-width="1" rx="4"/>
    
    <text x="30" y="88" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#ccd6f6">
      Week 3 Conflict:
    </text>
    <text x="30" y="103" font-family="Arial, sans-serif" font-size="10" fill="#64ffda">
      + New: Module 5 - Advanced Topics
    </text>
    <text x="30" y="117" font-family="Arial, sans-serif" font-size="10" fill="#8892b0">
      = Same: Modules 1-4 unchanged
    </text>
  </g>
  
  <!-- Decision Diamond -->
  <g transform="translate(550, 480)">
    <!-- Diamond shape -->
    <path d="M 0,-40 L 60,0 L 0,40 L -60,0 Z" fill="#112240" stroke="#ffd700" stroke-width="2"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ffd700">
      Conflicts?
    </text>
    <text x="0" y="10" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#8892b0">
      Found
    </text>
  </g>
  
  <!-- Left path: No conflicts -->
  <path d="M 490 520 L 300 520 L 300 580" stroke="#64ffda" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="360" y="510" font-family="Arial, sans-serif" font-size="11" fill="#64ffda">No conflicts</text>
  
  <!-- Right path: Has conflicts -->
  <path d="M 610 520 L 800 520 L 800 580" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680" y="510" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">Has conflicts</text>
  
  <!-- Step 5a: Auto Sync (No conflicts) -->
  <g transform="translate(160, 590)">
    <rect width="280" height="80" fill="#112240" stroke="#64ffda" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#64ffda"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a192f">5a</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#64ffda">
      Auto Sync
    </text>
    
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="11" fill="#ccd6f6">
      ✓ New version applied automatically
    </text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
      Upcoming deliveries updated
    </text>
  </g>
  
  <!-- Step 5b: Resolve Conflicts -->
  <g transform="translate(660, 590)">
    <rect width="280" height="80" fill="#112240" stroke="#ffb347" stroke-width="3" rx="8"/>
    
    <!-- Step number -->
    <circle cx="30" cy="30" r="18" fill="#ffb347"/>
    <text x="30" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0a192f">5b</text>
    
    <!-- Content -->
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#ffb347">
      Resolve Conflicts
    </text>
    
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="11" fill="#ccd6f6">
      AcadOps reviews and decides
    </text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
      Choose: Use Template / Keep Current
    </text>
  </g>
  
  <!-- Converge arrows -->
  <path d="M 300 680 L 550 680" stroke="#64ffda" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 800 680 L 550 680" stroke="#64ffda" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Final step: Complete -->
  <circle cx="550" cy="680" r="8" fill="#64ffda"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64ffda"/>
    </marker>
  </defs>
</svg>