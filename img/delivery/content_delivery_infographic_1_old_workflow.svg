<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="600" fill="#0a192f"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ccd6f6">
    Old Manual Content Release Workflow
  </text>
  <text x="500" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8892b0">
    Every Thursday: 6-8 hours of manual work, high error risk
  </text>
  
  <!-- Timeline indicator -->
  <text x="50" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ff6b6b">
    ⏰ THURSDAY
  </text>
  <text x="50" y="130" font-family="Arial, sans-serif" font-size="11" fill="#8892b0">
    Content Release Day
  </text>
  
  <!-- Step 1 -->
  <g transform="translate(80, 160)">
    <rect width="200" height="80" fill="#112240" stroke="#ff6b6b" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ff6b6b"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e6f1ff">1</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Check with AcadOps
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      "What content for Week X?"
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ff6b6b">
      ⏱ 15-20 min (Slack threads)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M 180 250 L 180 270" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 2 -->
  <g transform="translate(80, 280)">
    <rect width="200" height="80" fill="#112240" stroke="#ff6b6b" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ff6b6b"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e6f1ff">2</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Find Modules
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Navigate template batch
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ff6b6b">
      ⏱ 20-30 min (search manually)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M 180 370 L 180 390" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 3 -->
  <g transform="translate(80, 400)">
    <rect width="200" height="80" fill="#112240" stroke="#ff6b6b" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ff6b6b"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e6f1ff">3</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Delete Old Content
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Remove last week modules
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ff6b6b">
      ⏱ 15-20 min (per course)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M 280 320 L 360 320" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 4 -->
  <g transform="translate(370, 280)">
    <rect width="200" height="80" fill="#112240" stroke="#ffb347" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ffb347"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0a192f">4</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Import New Content
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Copy modules one by one
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffb347">
      ⏱ 45-60 min (high error risk)
    </text>
  </g>
  
  <!-- Arrow -->
  <path d="M 570 320 L 650 320" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 5 -->
  <g transform="translate(660, 280)">
    <rect width="200" height="80" fill="#112240" stroke="#ffb347" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ffb347"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0a192f">5</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Set Unlock Dates
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Thursday/Friday per program
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffb347">
      ⏱ 30-40 min (date calculations)
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 760 370 L 760 390" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 6 -->
  <g transform="translate(660, 400)">
    <rect width="200" height="80" fill="#112240" stroke="#ffb347" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ffb347"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0a192f">6</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Set Due Dates
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Sunday end of week
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffb347">
      ⏱ 20-30 min
    </text>
  </g>
  
  <!-- Arrow left -->
  <path d="M 660 440 L 580 440" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 7 -->
  <g transform="translate(370, 400)">
    <rect width="200" height="80" fill="#112240" stroke="#ffd700" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#ffd700"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0a192f">7</text>
    <text x="100" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Publish Content
    </text>
    <text x="100" y="52" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#8892b0">
      Release to learners
    </text>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#ffd700">
      ⏱ 10-15 min (module by module)
    </text>
  </g>
  
  <!-- Arrow left -->
  <path d="M 370 440 L 290 440" stroke="#64ffda" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- Step 8 -->
  <g transform="translate(80, 520)">
    <rect width="200" height="50" fill="#112240" stroke="#64ffda" stroke-width="2" rx="6"/>
    <circle cx="20" cy="20" r="14" fill="#64ffda"/>
    <text x="20" y="26" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0a192f">8</text>
    <text x="100" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#ccd6f6">
      Post Announcement
    </text>
    <text x="100" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#8892b0">
      ⏱ 10 min
    </text>
  </g>
  
  <!-- Summary Box -->
  <rect x="370" y="510" width="540" height="70" fill="#112240" stroke="#ff6b6b" stroke-width="2" rx="8"/>
  
  <!-- Total Time -->
  <text x="390" y="535" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ff6b6b">
    TOTAL TIME:
  </text>
  <text x="390" y="555" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff6b6b">
    6-8 hours
  </text>
  
  <!-- Error Rate -->
  <text x="560" y="535" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffb347">
    ERROR RATE:
  </text>
  <text x="560" y="555" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffb347">
    15%
  </text>
  
  <!-- Per Week -->
  <text x="730" y="535" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#8892b0">
    FREQUENCY:
  </text>
  <text x="730" y="555" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ccd6f6">
    Every week
  </text>
  
  <!-- Pain Points -->
  <text x="500" y="110" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#ccd6f6">
    Common Issues:
  </text>
  <text x="510" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">
    ❌ Version mismatches
  </text>
  <text x="510" y="148" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">
    ❌ Wrong modules released
  </text>
  <text x="690" y="130" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">
    ❌ Date calculation errors
  </text>
  <text x="690" y="148" font-family="Arial, sans-serif" font-size="11" fill="#ff6b6b">
    ❌ Manual Slack coordination
  </text>
  
  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64ffda"/>
    </marker>
  </defs>
</svg>